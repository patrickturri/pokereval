name: CI

# Credential-free continuous integration: the entire offline path — the full
# pytest suite plus the RLVR and self-play smoke loops — runs against the mock
# backend and the CFR solver, with NO API keys and NO Tinker account. The live
# `--live` paths are gated and never exercised here.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (offline, no credentials)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (offline stack)
        # Mirrors `make install`: pulls OpenSpiel (Kuhn/Leduc + CFR +
        # exploitability), the Tinker SDK, and the dev/demo extras so the
        # OpenSpiel-marked tests actually run rather than skip.
        run: python -m pip install -e ".[all]"

      - name: Full test suite
        run: python -m pytest -q

  smoke:
    name: Smoke loops (RLVR + self-play, mock backend)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (offline stack)
        run: python -m pip install -e ".[all]"

      - name: RLVR smoke loop
        run: make rl-smoke

      - name: Self-play smoke loop
        run: make selfplay-smoke
